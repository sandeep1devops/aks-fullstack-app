```yaml
name: Build and Deploy to AKS using Helm

on:
  push:
    branches:
      - helm-deploy

permissions:
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
  AKS_CLUSTER_NAME: ${{ vars.AKS_CLUSTER_NAME }}
  NAMESPACE: qa-helm
  RELEASE_NAME: myapp
  CHART_PATH: ./qa-app

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # 1. Checkout Code
    # =========================
    - name: Checkout Code
      uses: actions/checkout@v4

    # =========================
    # 2. Azure Login
    # =========================
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
          }

    # =========================
    # 3. Login to Azure Container Registry
    # =========================
    - name: Login to ACR
      run: |
        az acr login --name $ACR_NAME

    # =========================
    # 4. Set Image Tags
    # =========================
    - name: Set Image Tags
      run: |
        echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
        echo "RUN_NUMBER=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

    # =========================
    # 5. Build Backend Image
    # =========================
    - name: Build Backend Image
      run: |
        docker build \
          -t $ACR_LOGIN_SERVER/backend:${RUN_NUMBER} \
          -t $ACR_LOGIN_SERVER/backend:${SHORT_SHA} \
          -t $ACR_LOGIN_SERVER/backend:latest \
          -f server/Dockerfile \
          ./server

    # =========================
    # 6. Build Frontend Image
    # =========================
    - name: Build Frontend Image
      run: |
        docker build \
          -t $ACR_LOGIN_SERVER/frontend:${RUN_NUMBER} \
          -t $ACR_LOGIN_SERVER/frontend:${SHORT_SHA} \
          -t $ACR_LOGIN_SERVER/frontend:latest \
          -f client/Dockerfile \
          ./client

    # =========================
    # 7. Push Backend Image
    # =========================
    - name: Push Backend Image
      run: |
        docker push $ACR_LOGIN_SERVER/backend:${RUN_NUMBER}
        docker push $ACR_LOGIN_SERVER/backend:${SHORT_SHA}
        docker push $ACR_LOGIN_SERVER/backend:latest

    # =========================
    # 8. Push Frontend Image
    # =========================
    - name: Push Frontend Image
      run: |
        docker push $ACR_LOGIN_SERVER/frontend:${RUN_NUMBER}
        docker push $ACR_LOGIN_SERVER/frontend:${SHORT_SHA}
        docker push $ACR_LOGIN_SERVER/frontend:latest

    # =========================
    # 9. Get AKS Credentials
    # =========================
    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group $RESOURCE_GROUP \
          --name $AKS_CLUSTER_NAME \
          --overwrite-existing

    # =========================
    # 10. Install Helm
    # =========================
    - name: Install Helm
      uses: azure/setup-helm@v4

    # =========================
    # 11. Helm Lint
    # =========================
    - name: Helm Lint
      run: |
        helm lint $CHART_PATH

    # =========================
    # 12. Helm Dry Run
    # =========================
    - name: Helm Dry Run
      run: |
        helm upgrade --install $RELEASE_NAME $CHART_PATH \
          --namespace $NAMESPACE \
          --create-namespace \
          --dry-run \
          --debug \
          --set frontend.image.repository=$ACR_LOGIN_SERVER/frontend \
          --set frontend.image.tag=${RUN_NUMBER} \
          --set backend.image.repository=$ACR_LOGIN_SERVER/backend \
          --set backend.image.tag=${RUN_NUMBER}

    # =========================
    # 13. Deploy using Helm
    # =========================
    - name: Deploy with Helm
      run: |
        helm upgrade --install $RELEASE_NAME $CHART_PATH \
          --namespace $NAMESPACE \
          --create-namespace \
          --wait \
          --atomic \
          --set frontend.image.repository=$ACR_LOGIN_SERVER/frontend \
          --set frontend.image.tag=${RUN_NUMBER} \
          --set backend.image.repository=$ACR_LOGIN_SERVER/backend \
          --set backend.image.tag=${RUN_NUMBER}

    # =========================
    # 14. Verify Backend Rollout
    # =========================
    - name: Verify Backend Rollout
      run: |
        kubectl rollout status deployment/backend -n $NAMESPACE

    # =========================
    # 15. Verify Frontend Rollout
    # =========================
    - name: Verify Frontend Rollout
      run: |
        kubectl rollout status deployment/frontend -n $NAMESPACE

    # =========================
    # 16. Helm Information
    # =========================
    - name: Helm Status
      run: |
        helm list -n $NAMESPACE
        helm history $RELEASE_NAME -n $NAMESPACE
        helm get values $RELEASE_NAME -n $NAMESPACE

    # =========================
    # 17. Cluster Verification
    # =========================
    - name: Check Kubernetes Resources
      run: |
        kubectl get all -n $NAMESPACE
        kubectl get ingress -n $NAMESPACE
        kubectl get configmap -n $NAMESPACE
        kubectl get secret -n $NAMESPACE
