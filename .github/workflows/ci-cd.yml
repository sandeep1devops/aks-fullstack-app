name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: |
          {
            "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Login to ACR
      run: |
        az acr login --name ${{ vars.ACR_NAME }}

    - name: Build Backend Image
      run: |
        docker build \
          -t ${{ vars.ACR_LOGIN_SERVER }}/backend:${{ github.run_number }} \
          -f server/Dockerfile \
          ./server

    - name: Build Frontend Image
      run: |
        docker build \
          -t ${{ vars.ACR_LOGIN_SERVER }}/frontend:${{ github.run_number }} \
          -f client/Dockerfile \
          ./client

    - name: Push Backend Image
      run: |
        docker push ${{ vars.ACR_LOGIN_SERVER }}/backend:${{ github.run_number }}

    - name: Push Frontend Image
      run: |
        docker push ${{ vars.ACR_LOGIN_SERVER }}/frontend:${{ github.run_number }}

    - name: Set AKS Context
      run: |
        az aks get-credentials \
          --resource-group ${{ vars.RESOURCE_GROUP }} \
          --name ${{ vars.AKS_CLUSTER_NAME }} \
          --overwrite-existing

    - name: Verify Cluster
      run: |
        kubectl get nodes